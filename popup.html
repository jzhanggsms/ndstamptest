<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: Segoe UI, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f3f3f3;
    }
    .box {
      text-align: center;
      background: white;
      padding: 24px 32px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .check { font-size: 40px; }
    p { font-size: 16px; margin: 8px 0 0; }
  </style>
</head>
<body>
  <div class="box">
    <div class="check">✅</div>
    <p>Document stamped!</p>
  </div>
  <script>
    setTimeout(function () { window.close(); }, 2500);
  </script>
</body>
</html>
