<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script>
    Office.initialize = function () {};

    function stampDocument(event) {
      var today = new Date();
      var mm = String(today.getMonth() + 1).padStart(2, '0');
      var dd = String(today.getDate()).padStart(2, '0');
      var yyyy = today.getFullYear();
      var dateStr = mm + dd + yyyy;

      Word.run(function (ctx) {
        var footer = ctx.document.sections.getFirst().getFooter('primary');
        var paras = footer.paragraphs;
        ctx.load(paras, 'items');

        return ctx.sync().then(function () {
          // Delete everything except the first paragraph (page number lives there)
          for (var i = paras.items.length - 1; i >= 1; i--) {
            paras.items[i].delete();
          }

          // Line 2: doc number placeholder, font size 6
          var line2 = footer.insertParagraph('####-####-#### V.#', 'End');
          line2.font.size = 6;

          // Line 3: date, font size 6
          var line3 = footer.insertParagraph(dateStr, 'End');
          line3.font.size = 6;

          return ctx.sync();
        });
      }).then(function () {
        Office.context.ui.displayDialogAsync(
          'https://jzhanggsms.github.io/ndstamptest/popup.html',
          { height: 25, width: 25, displayInIframe: true },
          function () { event.completed(); }
        );
      }).catch(function () {
        event.completed();
      });
    }

    Office.actions.associate('stampDocument', stampDocument);
  </script>
</head>
<body></body>
</html>
